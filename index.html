<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SSO Test</title>
</head>

<body>
  <h1>SSO Test Page</h1>

  <button onclick="location.href='/.auth/login/aad?post_login_redirect_uriton onclick="location.href='/.auth/logout?post_logout_redirect_uri><br>

  <button onclick="getUser()">Get User Info</button>

  <pre id="output">Click "Get User Info" to display /.auth/me</pre>

  <script>
    async function getUser() {
      const res = await fetch("/.auth/me");
      const data = await res.json();
      document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
