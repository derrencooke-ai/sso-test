<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SSO Test</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; margin: 24px; }
    button { margin-right: 8px; margin-bottom: 8px; padding: 8px 12px; }
    pre { background:#f5f5f5; padding:12px; border:1px solid #ddd; overflow:auto; }
  </style>
</head>

<body>
  <h1>SSO Test Page</h1>

  <button id="btnLogin" type="button">Login</button>
  <button id="btnLogout" type="button">Logout</button>
  <button id="btnMe" type="button">Get User Info</button>

  <pre id="output">Click "Get User Info" to display /.auth/me</pre>

  <script>
    // Azure Static Web Apps built-in auth endpoints:
    //  - Login (Entra ID): /.auth/login/aad
    //  - Logout:          /.auth/logout
    //  - User info:       /.auth/me
    // These are provided by the SWA platform. 

    document.getElementById("btnLogin").addEventListener("click", () => {
      window.location.href = "/.auth/login/aad?post_login_redirect_uri=/";
    });

    document.getElementById("btnLogout").addEventListener("click", () => {
      window.location.href = "/.auth/logout?post_logout_redirect_uri=/";
    });

    document.getElementById("btnMe").addEventListener("click", async () => {
      const res = await fetch("/.auth/me");
      const data = await res.json();
      document.getElementById("output").textContent = JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
